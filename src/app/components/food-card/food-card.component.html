<div class="food-card"
     (click)="onViewDetails()"
     (mouseenter)="isHovered = true"
     (mouseleave)="isHovered = false">

  <div class="image-container">
    <img [src]="food.imageUrl" [alt]="food.name">

    <div class="badges">
      <span *ngIf="food.isPopular" class="badge popular">Populární</span>
      <span *ngIf="food.isVegetarian" class="badge vegetarian">
        <ion-icon name="leaf-outline"></ion-icon>
      </span>
      <span *ngIf="food.isSpicy" class="badge spicy">
        <ion-icon name="flame-outline"></ion-icon>
      </span>
    </div>

    <div class="discount-badge" *ngIf="food.discountPrice">
      -{{ getDiscountPercentage() }}%
    </div>

    <div class="quick-add" [class.show]="isHovered">
      <ion-button fill="solid" shape="round" (click)="onAddToCart($event)">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="content">
    <div class="rating">
      <ion-icon name="star"></ion-icon>
      <span>{{ food.rating }}</span>
      <span class="total-ratings">({{ food.totalRatings }})</span>
    </div>

    <h3>{{ food.name }}</h3>
    <p class="description">{{ food.description }}</p>

    <div class="prep-time">
      <ion-icon name="time-outline"></ion-icon>
      <span>{{ food.preparationTime }} min</span>
    </div>

    <div class="price-section">
      <div class="price">
        <span class="current">{{ getPrice() | currency:'Kč':'symbol':'1.0-0' }}</span>
        <span class="original" *ngIf="getOriginalPrice()">{{ getOriginalPrice() | currency:'Kč':'symbol':'1.0-0' }}</span>
      </div>

      <ion-button fill="clear" class="add-btn" (click)="onAddToCart($event)">
        <ion-icon slot="icon-only" name="cart-outline"></ion-icon>
      </ion-button>
    </div>
  </div>
</div>
